<!DOCTYPE html>
<html>
<head>
<title>Good Morning My Love</title>

<style>
body{
background: linear-gradient(to right,#ff9a9e,#fad0c4);
text-align:center;
font-family:Arial;
margin-top:150px;
}

button{
padding:15px 30px;
font-size:30px;
border:none;
border-radius:25px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

</style>

<script>
function showMessage(){
document.getElementById("popup").style.display="block";
}
</script>

</head>

<body>

<h1>For Someone Special 💕</h1>

<button onclick="showMessage()">Click Me ☀️</button>

<div id="popup">
<h2>🌞 Good Morning My Love 💖</h2>
<p>You are my first thought every morning pandulu.</p>
<p>Love you forever ❤️</p>
</div>

</body>
</html>
